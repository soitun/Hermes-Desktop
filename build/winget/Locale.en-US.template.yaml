Description: |-
  Hermes Desktop is a local-first agent shell for Windows. It runs a Hermes.Core agent
  in-process inside a WinUI 3 / .NET 10 host, with first-class support for offline
  providers (Ollama, LM Studio, vLLM, llama.cpp) and managed MCP servers.

  Features include token-streaming chat, structured tool-use surfacing, slash commands,
  memory and skills management, agent personas, and a diagnostics page that captures
  the runtime state of the desktop process.
